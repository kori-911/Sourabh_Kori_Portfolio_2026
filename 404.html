<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sourabh Kori — Product Designer</title>
    <script>
      // GitHub Pages 404 fallback:
      // When GitHub Pages serves a 404, this redirects to index.html
      // with the original path encoded in the hash fragment.
      // Since we use HashRouter, this is mostly a safety net.
      var path = window.location.pathname;
      window.location.replace(window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/') + '/#' + path);
    </script>
  </head>
  <body></body>
</html>
